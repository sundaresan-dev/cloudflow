{% extends "base.html" %}

{% block title %}Register - Website Deployment System{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: calc(100vh - 120px)">
        <div class="col-md-5">
            <div class="glass-panel p-5">
                <h3 class="auth-title">✨ Create Account</h3>
                
                <div id="alertContainer"></div>
                
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control glass-input" id="name" name="name" required placeholder="John Doe">
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control glass-input" id="email" name="email" required placeholder="name@example.com">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control glass-input" id="password" name="password" required placeholder="••••••••">
                            <small class="text-muted-glass d-block mt-1" style="font-size: 0.75rem;">At least 6 characters</small>
                        </div>
                        
                        <div class="col-md-6 mb-4">
                            <label for="confirmPassword" class="form-label">Confirm</label>
                            <input type="password" class="form-control glass-input" id="confirmPassword" name="confirm_password" required placeholder="••••••••">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary-custom w-100 mb-4 py-2" style="font-size: 1.1rem;">Register Now</button>
                </form>
                
                <p class="text-center text-muted-glass mb-0">
                    Already have an account? <a href="/login" class="text-decoration-none" style="color: #6366f1;">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/register.js') }}"></script>
{% endblock %}
